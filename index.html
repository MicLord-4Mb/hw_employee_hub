<!DOCTYPE html>
<html lang="en" xmlns="http://www.w3.org/1999/html">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/normalize/8.0.1/normalize.min.css"
        integrity="sha512-NhSC1YmyruXifcj/KFRWoC561YpHpc5Jtzgvbuzx5VozKpWvQ+4nXhPdFgmx8xqexRcpAglTj9sIBWINXa8x5w=="
        crossorigin="anonymous" referrerpolicy="no-referrer"/>
  <title>Employee Hub</title>
  <link rel="stylesheet" href="src/style.css">
  <script type="module" src="src/script.js" defer></script>
</head>
<body>
  <div class="app">
    <div class="app-header">
      <h1>Employee Hub</h1>
      <div class="app-actions">
        <div class="menu-wrapper">
          <section class="menu-section-add">
            <div>
              <label for="emp-id">ID #:</label>
              <input class="menu-inp-num" type="number" id="emp-id" min="1" placeholder="ID (example, 1)" />
            </div>
            <div>
              <label for="emp-name">Name:</label>
              <input class="menu-inp-txt" type="text" id="emp-name" placeholder="Name" />
            </div>
            <div>
              <label for="emp-title">Title/Division:</label>
              <input class="menu-inp-txt" type="text" id="emp-title" placeholder="Title" />
            </div>
            <div>
              <label for="emp-salary">Salary:</label>
              <input class="menu-inp-num" type="number" id="emp-salary" min="10000" placeholder="Salary" />
            </div>
            <button class="btn" id="btn-add">Add / Update employee</button>
          </section>
          <section class="menu-section-find">
            <span>
              <label for="search-query">Find:</label>
              <input class="menu-inp-txt" type="text" id="search-query" placeholder="Find an employee" />
            </span>
            <button class="btn" id="btn-search">Find</button>
            <button class="btn" id="btn-reset">Reset</button>
            <button class="btn" id="btn-clear">Clear</button>
          </section>
          <div class="menu-msg" id="message-box"></div>
        </div>
      </div>
    </div>
    <div class="app-content">
      <div class="app-form">My Form</div>
    </div>
    <div class="app-footer">
      <p class="footer">(c) 2026</p>
    </div>
  </div>
</body>
</html>
